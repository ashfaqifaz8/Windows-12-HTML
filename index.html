<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pseudo Windows 12 Mobile</title>
  <!-- Link external CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Lock Screen -->
  <div id="lock-screen">
    <div class="lock-time"></div>
    <div class="lock-date"></div>
    <button id="unlock-button">Unlock</button>
  </div>

  <!-- Desktop -->
  <div id="desktop">
    <!-- Example pinned icons -->
    <div class="desktop-icon" onclick="openWindow('file-explorer')">
      <img src="icons/file.png" alt="File Explorer">
      <span>File Explorer</span>
    </div>
    <div class="desktop-icon" onclick="openWindow('settings')">
      <img src="icons/settings.png" alt="Settings">
      <span>Settings</span>
    </div>
    <div class="desktop-icon" onclick="openWindow('solitaire')">
      <img src="icons/game.png" alt="Solitaire">
      <span>Solitaire</span>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="start-button">Start</button>
    <div id="taskbar-apps"></div>
    <div id="system-tray">
      <span id="wifi">📶</span>
      <span id="battery">🔋</span>
      <span id="sound">🔊</span>
      <span id="clock"></span>
    </div>
  </div>

  <!-- Start Menu -->
  <div id="start-menu">
    <div class="start-header">
      <span>User</span>
    </div>
    <div class="start-apps">
      <button onclick="openWindow('file-explorer')">File Explorer</button>
      <button onclick="openWindow('settings')">Settings</button>
      <button onclick="openWindow('app-store')">App Store</button>
      <button onclick="openWindow('media-player')">Media Player</button>
      <button onclick="openWindow('solitaire')">Solitaire</button>
      <button onclick="openWindow('paint')">Paint</button>
      <button onclick="openWindow('calculator')">Calculator</button>
      <button onclick="openWindow('notepad')">Notepad</button>
    </div>
    <div class="start-footer">
      <button>Power</button>
    </div>
  </div>

  <!-- Notification Center -->
  <div id="notification-center">
    <h3>Notifications</h3>
    <div id="notifications-list">
      <!-- Notifications will appear here -->
    </div>
    <h3>Quick Actions</h3>
    <div id="quick-actions">
      <button>Wi-Fi</button>
      <button>Bluetooth</button>
      <button>Airplane Mode</button>
      <button>Dark Mode</button>
    </div>
  </div>

  <!-- Example Windows -->
  <div class="window" id="file-explorer">
    <div class="titlebar">
      <span>File Explorer</span>
      <div class="controls">
        <button onclick="minimizeWindow('file-explorer')">_</button>
        <button onclick="maximizeWindow('file-explorer')">[]</button>
        <button onclick="closeWindow('file-explorer')">X</button>
      </div>
    </div>
    <div class="content">
      <p>File Explorer content goes here.</p>
    </div>
  </div>

  <div class="window" id="settings">
    <div class="titlebar">
      <span>Settings</span>
      <div class="controls">
        <button onclick="minimizeWindow('settings')">_</button>
        <button onclick="maximizeWindow('settings')">[]</button>
        <button onclick="closeWindow('settings')">X</button>
      </div>
    </div>
    <div class="content">
      <p>Settings content goes here.</p>
    </div>
  </div>

  <!-- Link external JS -->
  <script src="script.js"></script>
</body>
</html>
