<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pseudo Windows 12</title>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, sans-serif;
      background: url('wallpaper.jpg') no-repeat center center fixed;
      background-size: cover;
    }
    /* Taskbar */
    #taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: #2d2d2d;
      display: flex;
      align-items: center;
      padding: 0 10px;
      color: white;
    }
    #start-button {
      background: #0078d7;
      border: none;
      color: white;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 4px;
    }
    /* Start Menu */
    #start-menu {
      position: fixed;
      bottom: 50px;
      left: 10px;
      width: 250px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      display: none;
      flex-direction: column;
    }
    #start-menu button {
      padding: 10px;
      border: none;
      background: none;
      text-align: left;
      cursor: pointer;
    }
    /* Window */
    .window {
      position: absolute;
      top: 100px;
      left: 100px;
      width: 300px;
      height: 200px;
      background: #fff;
      border: 1px solid #666;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }
    .titlebar {
      background: #0078d7;
      color: white;
      padding: 5px;
      cursor: move;
      display: flex;
      justify-content: space-between;
    }
    .titlebar button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Taskbar -->
  <div id="taskbar">
    <button id="start-button">Start</button>
    <div style="margin-left:auto;">10:21 AM</div>
  </div>

  <!-- Start Menu -->
  <div id="start-menu">
    <button onclick="openWindow('File Explorer')">File Explorer</button>
    <button onclick="openWindow('Settings')">Settings</button>
    <button onclick="openWindow('Solitaire')">Solitaire</button>
  </div>

  <!-- Example Window -->
  <div class="window" id="example-window">
    <div class="titlebar">
      <span>Example App</span>
      <div>
        <button onclick="minimizeWindow('example-window')">_</button>
        <button onclick="maximizeWindow('example-window')">[]</button>
        <button onclick="closeWindow('example-window')">X</button>
      </div>
    </div>
    <div style="padding:10px;">Hello from your pseudo Windows!</div>
  </div>

  <script>
    const startButton = document.getElementById('start-button');
    const startMenu = document.getElementById('start-menu');

    startButton.onclick = () => {
      startMenu.style.display = startMenu.style.display === 'flex' ? 'none' : 'flex';
    };

    function openWindow(name) {
      alert("Opening " + name + " (to be implemented)");
    }

    function minimizeWindow(id) {
      document.getElementById(id).style.display = 'none';
    }

    function maximizeWindow(id) {
      const win = document.getElementById(id);
      win.style.width = '100%';
      win.style.height = 'calc(100% - 50px)';
      win.style.top = '0';
      win.style.left = '0';
    }

    function closeWindow(id) {
      document.getElementById(id).remove();
    }
  </script>
</body>
</html>
